name: hris_mobile
description: HRIS Flutter mobile app
publish_to: "none"
version: 0.1.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  hooks_riverpod: ^2.4.0
  dio: ^5.4.0
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.0
  intl: ^0.18.0
  flutter_secure_storage: ^9.0.0
  flutter_dotenv: ^5.1.0
  go_router: ^14.0.0
  shared_preferences: ^2.2.0
  geolocator: ^12.0.0
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.12.0
  tflite_flutter: ^0.11.0
  permission_handler: ^11.3.0
  image: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/ml/
    - .env
